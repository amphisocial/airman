# /etc/nginx/sites-available/airplanes.athenabot.ai
#
# Install this as-is (port 80 only), then let certbot rewrite it for TLS:
#   sudo certbot --nginx -d airplanes.athenabot.ai
# Certbot adds the listen 443 block, the certificate lines, and the
# HTTP→HTTPS redirect for you. Don't hand-write those.

# NOTE: this map is global to nginx, and fusebox.athenabot.ai already defines an
# identical one on this box. Two copies = "duplicate map" and nginx won't start.
# If `sudo nginx -t` complains, delete this block — the existing one already works.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name airplanes.athenabot.ai;

    access_log /var/log/nginx/sortie.access.log;
    error_log  /var/log/nginx/sortie.error.log;

    # Godot ships a ~10-30MB wasm on first load; let it through and gzip it.
    client_max_body_size 2m;
    gzip on;
    gzip_types application/javascript application/wasm application/octet-stream text/css text/html application/json;
    gzip_min_length 1024;

    # The game socket. Without these two headers the handshake fails and
    # players sit on "Connecting…" forever.
    location /ws {
        proxy_pass http://127.0.0.1:4020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:4020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
